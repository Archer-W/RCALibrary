# =============================================================================
# NetCare VoC Trend Triage — fixed-workflow template
#
# OWNERSHIP (see ../../docs/09-usecase-handoff.md):
#   * STRUCTURE (meta / input_groups / report) -> structure agent
#   * ANALYSIS LOGIC (the voc_collect_trend analyzer) -> usecases/netcare_voc.py
#   * DATA SOURCE -> data agent's swap point: dummy CSV via the sample provider
#     now; real Snowflake later. See IMPLEMENTATION.md.
#
# STATUS: Step 1 (collect trend information) is implemented and runs against the
# bundled dummy data (data/samples/ana.rca.netcare-voc-trend/voc_trends.csv).
# Steps 2-6 are not built yet.
# =============================================================================

meta:
  id: ana.rca.netcare-voc-trend
  name: "NetCare VoC Trend Triage"
  # The TEMPLATE description describes the WORKFLOW SOLUTION (its fixed steps) —
  # not the problem (which lives in meta.problem.description below).
  description: >-
    Fixed, step-by-step triage of the trend: (1) trend look-up,
    (2) neighbor trend correlation, (3) customer-complaint summary,
    (4) known network-event search & ranking, (5) neighbor impact analysis, and
    (6) conclusion with recommended next steps.
  version: "0.1.0"
  solution_level: 1
  tags: [voc, customer-care, triage]
  # Enable the AI "build a panel from a description" chat in the add-panel flow.
  # The engine parses the request, picks a predefined library panel, fills params,
  # and builds it. Free/offline simulated engine by default (RCA_AI_PROVIDER). See
  # docs/11-ai-panel-builder.md.
  ai_panels: true
  problem:
    id: netcare.voc-trend
    name: "NetCare VoC Trend Triage"
    description: >-
      Investigate an increase in NetCare Voice-of-Customer complaints (customer-care
      calls and troubleshooting requests) and identify the likely drivers.
    domain: "Customer Care / VoC"
    tags: ["customer care", "voc trend", "mobility service issue"]
  # Informational triage flow shown on the INPUT page (before the user runs it).
  # Steps within a stage run in parallel; stages flow left -> right.
  workflow:
    caption: "Steps within a stage run in parallel; stages flow left → right."
    stages:
      - { title: "Confirm trend", steps: ["Look up & validate the reported trend"] }
      - { title: "Location context", steps: ["Pull site inventory (lat/lon)", "Classify area type by site density"] }
      - { title: "Neighbor logic", steps: ["Set search radius & hop-count for the area type"] }
      - { title: "Scan neighborhood", steps: ["Find trends on nearby sites", "Find tickets across the area"] }
      - { title: "Correlate trends", steps: ["Spatial proximity", "Temporal overlap"] }
      - { title: "Rank tickets", steps: ["Score by relevance & inferred customer impact"] }
      - { title: "Restore outlook", steps: ["Check PRT & whether it has expired"] }
      - { title: "Conclusion", steps: ["State the likely root cause & next action"] }

# --- STRUCTURE (structure agent) ---------------------------------------------
# Two mutually-exclusive input sets — the user picks ONE to start the lookup.
# The chosen set's key (input_group) determines Step 1's lookup path; it reaches
# the analyzer as ${input._input_group}.
input_groups:
  - key: trend_id
    label: "GSA / NetCare Trend ID"
    inputs:
      - name: trend_id
        label: "GSA or NetCare Trend ID"
        type: string
        required: true
        help: "the **USID-level** trend ID of a GSA trend or NetCare Trend"
        placeholder: "e.g. T-1001"

  - key: usid_date
    label: "USID + Date"
    inputs:
      - name: usid
        label: "USID"
        type: string
        required: true
        help: "the cell tower ID"
        placeholder: "e.g. 0123456"
      - name: date
        label: "Date"
        type: date
        required: true
        help: "the approximate date of the trend"
      - name: search_neighbors
        label: "Search neighbors"
        type: bool
        required: false
        default: true
        help: "whether to look up possible trends in the neighborhood (recommended)"

# --- DATA (data agent's swap point) ------------------------------------------
# Now: the sample provider serves the dummy CSV `voc_trends` (the whole small
# table is fetched and the analyzer does the lookup).
# Real data: implement the Snowflake provider, set source: snowflake (or
# RCA_DATASOURCE=snowflake), and push the per-input_group filtering into SQL
# using ${input._input_group} + the set's fields. See IMPLEMENTATION.md.
data_pulls:
  - id: trends
    # source omitted -> active data source (sample = dummy CSV now).
    query:
      dataset: voc_trends
      string_columns: [usid, trend_id]   # IDs are strings (USID has leading zeros)
      # No params/filters for the dummy pull (analyzer filters the small table).
      # Real Snowflake should filter in SQL by trend_id OR usid+date per input set.
  # Step 2 pulls (correlated neighbor trends + per-USID care-call volume).
  - id: neighbors
    query:
      dataset: voc_neighbors
      string_columns: [anchor_usid, usid, trend_id]
  - id: call_volume
    query:
      dataset: voc_call_volume
      string_columns: [usid]
  # Step 3 pull (tickets/events associated to the cluster + 2-hop neighbors).
  - id: tickets
    query:
      dataset: voc_tickets
      string_columns: [anchor_usid, usid]
  # Map layer pull (site inventory: USID -> lat/lon).
  - id: site_inventory
    query:
      dataset: voc_sites
      string_columns: [usid]

# --- ANALYSIS ----------------------------------------------------------------
# Planned fixed-workflow triage:
#   1. Trend look-up                         <- IMPLEMENTED (voc_collect_trend)
#   2. Neighbor trend correlation            <- IMPLEMENTED (voc_neighbor_correlation)
#   3. Known network-event search & ranking  <- IMPLEMENTED (voc_ticket_search)
#   4. Customer-complaint summary            <- TODO
#   5. Neighbor impact analysis              <- TODO
#   6. Conclusion & recommended next steps   <- TODO
# Step 1 branches on _input_group, reports the trend (or a set-specific
# not-found message), and always reports table freshness. Step 2 reads Step 1's
# confirmed anchor (ctx.results) + the neighbors/call_volume pulls. Logic lives
# in usecases/netcare_voc.py (loaded via RCA_PLUGINS).
analysis:
  - id: collect_trend
    analyzer: voc_collect_trend
    inputs: { dataset: trends }
    params: {}
  - id: neighbor_correlation
    analyzer: voc_neighbor_correlation
    inputs: { dataset: neighbors }   # also reads ctx.datasets["call_volume"]
    params: {}
  - id: ticket_search
    analyzer: voc_ticket_search
    inputs: { dataset: tickets }     # chains on collect_trend + neighbor_correlation
    params: {}
  - id: map_build
    analyzer: voc_map_build
    inputs: { dataset: site_inventory }   # chains on Steps 1-3; reads call_volume/neighbors
    params: {}

# --- STRUCTURE (structure agent) ---------------------------------------------
report:
  title: "NetCare VoC Trend Triage — Step 1: Collect trend information"
  panels:
    # The three summary stats combined into ONE panel (a compact header row):
    # table freshness (always), likely root cause + planned restore (when a trend
    # was found). Each sub-stat reads its own analysis_ref + summary keys.
    - id: header_stats
      type: stat_group
      title: "Triage summary"
      options:
        stats:
          - { title: "Table data freshness", analysis_ref: collect_trend,
              value: delay_hours, state: delay_state, sub: table_updated, unit: "h behind" }
          - { title: "Likely root cause", analysis_ref: ticket_search,
              value: rc_value, state: rc_state, badge: rc_badge, detail: rc_detail, sub: rc_sub,
              visible_when: { ref: collect_trend, key: found } }
          - { title: "Planned restore (PRT)", analysis_ref: ticket_search,
              value: prt_value, state: prt_state, sub: prt_sub, alert: prt_alert, value_text: true,
              visible_when: { ref: collect_trend, key: found } }
    # The found trend as a grid of value boxes — one box per value (Trend ID,
    # USID, status [colored: Active=red/Cooling=orange/Closed=blue], start time,
    # duration, last update). If not found, a set-specific message is shown
    # instead (the RCA flow stops here on not-found).
    - id: trend_info
      type: fields
      title: "Trend"
      analysis_ref: collect_trend
      overlay_ref: neighbor_correlation   # appends the two call-total boxes next to status
      encoding: { value: trend_fields }

    # --- Step 2: neighbor trend correlation ---------------------------------
    # Only rendered when Step 1 found a trend (the flow terminates otherwise).
    - id: neighbor_table
      type: table
      title: "Correlated trends — searched USID & neighbors"
      analysis_ref: neighbor_correlation
      visible_when: { ref: collect_trend, key: found }
      encoding:
        columns: ["Trend ID", "USID", "Trend status", "Trend start", "Duration", "Distance (km)", "Location type"]
    - id: neighbor_timeseries
      type: timeseries
      title: "Care call volume — searched USID & neighbors"
      analysis_ref: neighbor_correlation
      overlay_ref: ticket_search   # toggleable ticket bands/tags (Step 3)
      visible_when: { ref: collect_trend, key: found }
      encoding: { value: volume_ts }

    # --- Step 3: associated tickets / known network events ------------------
    # Color-coded table (cells may be {value,tone} badges), ranked by confidence.
    - id: ticket_table
      type: table
      title: "Associated tickets — cluster + 2-hop neighbors (by confidence)"
      analysis_ref: ticket_search
      visible_when: { ref: collect_trend, key: found }
      encoding:
        columns: ["Ticket ID", "Ticket type", "Event name", "USID", "Trend dist (km)", "Event start", "Event end", "PRT", "Status", "Confidence", "Impact"]

    # --- Map layer: trend cluster, tickets & nearby sites -------------------
    # Color: Active=red, Cooling=orange, Closed=blue, no-trend=grey. Street map
    # (muted carto basemap) ON by default; the panel's "Street map" toggle / the
    # RCA_MAP_TILES env can switch to the offline blank canvas.
    - id: trend_map
      type: map
      title: "Neighborhood map — trends, tickets & nearby sites"
      analysis_ref: map_build
      visible_when: { ref: collect_trend, key: found }
      encoding: { value: map_data }
      # Default basemap = offline blank canvas (real triangle/circle shapes, no
      # internet). Users flip on the muted street map via the "Street map" toggle;
      # set RCA_MAP_TILES=1 to default it on for a deployment.
      options: { map_tiles: false }

# --- PANEL LIBRARY -----------------------------------------------------------
# OPTIONAL panels the user can ADD on demand (not loaded by default). Each bundle
# is self-contained: it declares its own data_pulls + analysis (run lazily only
# when the panel is added) and may chain on the main analysis results. The
# bundle's `panel` is a normal PanelSpec. See docs/10 + docs/04.
#   * STRUCTURE agent owns each bundle's `panel` (type/encoding/options/title).
#   * DATA agent owns each bundle's `data_pulls` + `analysis`.
panel_library:
  # AI test case A: a care-call-volume timeseries with an AI-tunable date range &
  # granularity. It declares NO data_pull (it reuses the main `call_volume` pull and
  # Step 2's cluster); the analyzer reads ctx.params for date_start/date_end/
  # granularity. Addable manually (defaults) or via the AI chat, e.g.
  # "show call volume from 2026-05-01 to 2026-05-20 at hourly granularity".
  - id: call_volume_trend
    title: "Care call volume — by date range & granularity"
    description: "Call-volume timeseries for the trend cluster; AI can set the date range & granularity."
    analysis:
      - id: call_volume_panel
        analyzer: voc_call_volume_trend     # reuses main call_volume + cluster_usids; reads ctx.params
        inputs: { dataset: call_volume }
        params: {}
    panel:
      id: call_volume_trend
      type: timeseries
      title: "Care call volume — searched USID & neighbors"
      analysis_ref: call_volume_panel
      overlay_ref: ticket_search
      encoding: { value: volume_ts }

  - id: complaint_pie
    title: "Customer complaint type distribution"
    description: "Pie of complaint types (voice, data, coverage, …) across the trend cluster."
    data_pulls:
      - id: complaints
        query:
          dataset: voc_complaints
          string_columns: [usid]
    analysis:
      - id: complaint_distribution
        analyzer: voc_complaint_distribution   # chains on collect_trend + neighbor_correlation
        inputs: { dataset: complaints }
        params: {}
    panel:
      id: complaint_pie
      type: pie
      title: "Customer complaint type distribution"
      analysis_ref: complaint_distribution
      encoding: { labels: complaint_type, values: count }
      options: { hole: 0.45 }

  - id: rrc_kpi
    title: "RAN RRC_Conn KPI — searched USID & neighbors"
    description: "Hourly RRC connected-users KPI for trend/ticket USIDs, with ticket overlay."
    data_pulls:
      - id: ran_kpi
        query:
          dataset: voc_ran_kpi
          string_columns: [usid]
    analysis:
      - id: rrc_kpi_ts
        analyzer: voc_rrc_kpi                   # chains on Steps 1-3 (cluster + tickets)
        inputs: { dataset: ran_kpi }
        params: {}
    panel:
      id: rrc_kpi
      type: timeseries
      title: "RAN RRC_Conn KPI — searched USID & neighbors"
      analysis_ref: rrc_kpi_ts
      overlay_ref: ticket_search               # reuse the ticket bands from Step 3
      encoding: { value: rrc_ts }

  # AI test case B: an AI-ONLY panel (requires_ai). It digests free-text customer-
  # care transcripts via the summarize_symptoms skill, filters out non-network asks
  # (billing/account), and summarizes the network symptom-type breakdown. Hidden
  # from the manual picker; build it in the AI chat, e.g. "summarize the symptom
  # types from the call transcripts". DATA AGENT owns the real transcript source;
  # the LLM AGENT owns the real summarize_symptoms skill. See docs/11.
  - id: transcript_summary
    title: "Customer symptom breakdown (from call transcripts)"
    description: "AI-synthesized summary of network symptom types mentioned in care-call transcripts."
    requires_ai: true
    data_pulls:
      - id: call_transcripts
        query:
          dataset: voc_call_transcripts
          string_columns: [usid]
    analysis:
      - id: transcript_analysis
        analyzer: voc_transcript_summary       # chains on collect_trend + neighbor_correlation
        inputs: { dataset: call_transcripts }
        params: {}
    panel:
      id: transcript_summary
      type: markdown
      title: "Customer symptom breakdown (from call transcripts)"
      analysis_ref: transcript_analysis
      encoding: { value: markdown }
