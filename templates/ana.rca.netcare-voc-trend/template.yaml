# =============================================================================
# NetCare VoC Trend Triage — fixed-workflow template
#
# OWNERSHIP (see ../../docs/09-usecase-handoff.md):
#   * STRUCTURE (meta / input_groups / report) -> structure agent
#   * ANALYSIS LOGIC (the voc_collect_trend analyzer) -> usecases/netcare_voc.py
#   * DATA SOURCE -> data agent's swap point: dummy CSV via the sample provider
#     now; real Snowflake later. See IMPLEMENTATION.md.
#
# STATUS: Step 1 (collect trend information) is implemented and runs against the
# bundled dummy data (data/samples/ana.rca.netcare-voc-trend/voc_trends.csv).
# Steps 2-6 are not built yet.
# =============================================================================

meta:
  id: ana.rca.netcare-voc-trend
  name: "NetCare VoC Trend Triage"
  # The TEMPLATE description describes the WORKFLOW SOLUTION (its fixed steps) —
  # not the problem (which lives in meta.problem.description below).
  description: >-
    Fixed, step-by-step triage of the trend: (1) trend look-up,
    (2) neighbor trend correlation, (3) customer-complaint summary,
    (4) known network-event search & ranking, (5) neighbor impact analysis, and
    (6) conclusion with recommended next steps.
  version: "0.1.0"
  solution_level: 1
  tags: [voc, customer-care, triage]
  problem:
    id: netcare.voc-trend
    name: "NetCare VoC Trend Triage"
    description: >-
      Investigate an increase in NetCare Voice-of-Customer complaints (customer-care
      calls and troubleshooting requests) and identify the likely drivers.
    domain: "Customer Care / VoC"
    tags: ["customer care", "voc trend", "mobility service issue"]

# --- STRUCTURE (structure agent) ---------------------------------------------
# Two mutually-exclusive input sets — the user picks ONE to start the lookup.
# The chosen set's key (input_group) determines Step 1's lookup path; it reaches
# the analyzer as ${input._input_group}.
input_groups:
  - key: trend_id
    label: "GSA / NetCare Trend ID"
    inputs:
      - name: trend_id
        label: "GSA or NetCare Trend ID"
        type: string
        required: true
        help: "the **USID-level** trend ID of a GSA trend or NetCare Trend"
        placeholder: "e.g. T-1001"

  - key: usid_date
    label: "USID + Date"
    inputs:
      - name: usid
        label: "USID"
        type: string
        required: true
        help: "the cell tower ID"
        placeholder: "e.g. 0123456"
      - name: date
        label: "Date"
        type: date
        required: true
        help: "the approximate date of the trend"
      - name: search_neighbors
        label: "Search neighbors"
        type: bool
        required: false
        default: true
        help: "whether to look up possible trends in the neighborhood (recommended)"

# --- DATA (data agent's swap point) ------------------------------------------
# Now: the sample provider serves the dummy CSV `voc_trends` (the whole small
# table is fetched and the analyzer does the lookup).
# Real data: implement the Snowflake provider, set source: snowflake (or
# RCA_DATASOURCE=snowflake), and push the per-input_group filtering into SQL
# using ${input._input_group} + the set's fields. See IMPLEMENTATION.md.
data_pulls:
  - id: trends
    # source omitted -> active data source (sample = dummy CSV now).
    query:
      dataset: voc_trends
      string_columns: [usid, trend_id]   # IDs are strings (USID has leading zeros)
      # No params/filters for the dummy pull (analyzer filters the small table).
      # Real Snowflake should filter in SQL by trend_id OR usid+date per input set.
  # Step 2 pulls (correlated neighbor trends + per-USID care-call volume).
  - id: neighbors
    query:
      dataset: voc_neighbors
      string_columns: [anchor_usid, usid, trend_id]
  - id: call_volume
    query:
      dataset: voc_call_volume
      string_columns: [usid]
  # Step 3 pull (tickets/events associated to the cluster + 2-hop neighbors).
  - id: tickets
    query:
      dataset: voc_tickets
      string_columns: [anchor_usid, usid]

# --- ANALYSIS ----------------------------------------------------------------
# Planned fixed-workflow triage:
#   1. Trend look-up                         <- IMPLEMENTED (voc_collect_trend)
#   2. Neighbor trend correlation            <- IMPLEMENTED (voc_neighbor_correlation)
#   3. Known network-event search & ranking  <- IMPLEMENTED (voc_ticket_search)
#   4. Customer-complaint summary            <- TODO
#   5. Neighbor impact analysis              <- TODO
#   6. Conclusion & recommended next steps   <- TODO
# Step 1 branches on _input_group, reports the trend (or a set-specific
# not-found message), and always reports table freshness. Step 2 reads Step 1's
# confirmed anchor (ctx.results) + the neighbors/call_volume pulls. Logic lives
# in usecases/netcare_voc.py (loaded via RCA_PLUGINS).
analysis:
  - id: collect_trend
    analyzer: voc_collect_trend
    inputs: { dataset: trends }
    params: {}
  - id: neighbor_correlation
    analyzer: voc_neighbor_correlation
    inputs: { dataset: neighbors }   # also reads ctx.datasets["call_volume"]
    params: {}
  - id: ticket_search
    analyzer: voc_ticket_search
    inputs: { dataset: tickets }     # chains on collect_trend + neighbor_correlation
    params: {}

# --- STRUCTURE (structure agent) ---------------------------------------------
report:
  title: "NetCare VoC Trend Triage — Step 1: Collect trend information"
  panels:
    # Always shown: table freshness as a data-quality indicator (red if > 6h late).
    - id: data_freshness
      type: stat
      title: "Table data freshness"
      analysis_ref: collect_trend
      encoding: { value: delay_hours, state: delay_state, sub: table_updated }
      options: { unit: "h behind" }
    # Root cause: the top (highest-confidence) associated ticket, and its PRT.
    - id: root_cause
      type: stat
      title: "Likely root cause"
      analysis_ref: ticket_search
      visible_when: { ref: collect_trend, key: found }
      encoding: { value: rc_value, state: rc_state, sub: rc_sub }
    - id: prt
      type: stat
      title: "Planned restore (PRT)"
      analysis_ref: ticket_search
      visible_when: { ref: collect_trend, key: found }
      encoding: { value: prt_value, state: prt_state, sub: prt_sub, alert: prt_alert }
      options: { value_text: true }   # date value -> smaller, one-line
    # The found trend as a grid of value boxes — one box per value (Trend ID,
    # USID, status [colored: Active=red/Cooling=orange/Closed=grey], start time,
    # duration, last update). If not found, a set-specific message is shown
    # instead (the RCA flow stops here on not-found).
    - id: trend_info
      type: fields
      title: "Trend"
      analysis_ref: collect_trend
      encoding: { value: trend_fields }

    # --- Step 2: neighbor trend correlation ---------------------------------
    # Only rendered when Step 1 found a trend (the flow terminates otherwise).
    - id: neighbor_table
      type: table
      title: "Correlated trends — searched USID & neighbors"
      analysis_ref: neighbor_correlation
      visible_when: { ref: collect_trend, key: found }
      encoding:
        columns: ["Trend ID", "USID", "Trend start", "Duration", "Distance (km)", "Location type"]
    - id: neighbor_timeseries
      type: timeseries
      title: "Care call volume — searched USID & neighbors"
      analysis_ref: neighbor_correlation
      overlay_ref: ticket_search   # toggleable ticket bands/tags (Step 3)
      visible_when: { ref: collect_trend, key: found }
      encoding: { value: volume_ts }

    # --- Step 3: associated tickets / known network events ------------------
    # Color-coded table (cells may be {value,tone} badges), ranked by confidence.
    - id: ticket_table
      type: table
      title: "Associated tickets — cluster + 2-hop neighbors (by confidence)"
      analysis_ref: ticket_search
      visible_when: { ref: collect_trend, key: found }
      encoding:
        columns: ["Ticket ID", "Ticket type", "Event name", "USID", "Trend dist (km)", "Event start", "Event end", "PRT", "Status", "Confidence", "Impact"]
